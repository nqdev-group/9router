# # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
# 9Router - Connect All AI Code Tools to 40+ AI Providers & 100+ Models
# -----------------------------------------
# A self-hosted, open-source, and privacy-focused router for your applications.
# GitHub: https://github.com/nguyenquy0710/9router
# Documentation: https://9router.com/
# -----------------------------------------
# START: docker-compose -f .\docker\docker-compose.yml up -d --build --force-recreate --remove-orphans
# STOP: docker-compose -f .\docker\docker-compose.yml down -v --remove-orphans
# # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #

services:
  # 9router service to run the 9router application
  9router:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nqdev/9router:${VERSION:-latest}
    container_name: 9router
    restart: unless-stopped
    # network_mode: host
    ports:
      - "20128:20128"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - VERSION=${VERSION:-latest}
      # Required application variables
      - JWT_SECRET=${JWT_SECRET:-9router-secret}  # openssl rand -base64 32
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-9router-password}
      - DATA_DIR=${DATA_DIR:-/app/data/9router}
      # Recommended security and ops variables
      - API_KEY_SECRET=${API_KEY_SECRET:-9router-api-key-secret}
      - MACHINE_ID_SALT=${MACHINE_ID_SALT:-9router-machine-id-salt}
      - ENABLE_REQUEST_LOGS=${ENABLE_REQUEST_LOGS:-false}
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-false}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY:-false}
      # Backward-compatible/public variables:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
      - NEXT_PUBLIC_CLOUD_URL=${NEXT_PUBLIC_CLOUD_URL:-https://cloud.9router.com}
    env_file:
      - .env
    volumes:
      - 9router-data:/app/data
      - 9router-usage:/root/.9router

volumes:
  9router-data:
  9router-usage: