name: Testing - 9Router Build Docker Image

on:
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}-testing
  DOCKERHUB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/9router-testing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ github.event_name == 'push' && env.DOCKERHUB_IMAGE || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=26.5.${{ github.run_number }}-testing,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcachetesting
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcachetesting,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false
